services:
  db:
    image: postgres:16-alpine
    container_name: onibus-db
    environment:
      POSTGRES_DB: onibus_express
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - onibus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onibus_express"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/src/OniBusExpress.Api/Dockerfile
    container_name: onibus-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=onibus_express;Username=postgres;Password=postgres
    ports:
      - "8080:8080"

volumes:
  onibus_pgdata:
